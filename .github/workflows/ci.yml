name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medsignal-ai/backend
    env:
      DATABASE_URL: sqlite+pysqlite:///:memory:
      MLFLOW_TRACKING_URI: file:/tmp/mlruns
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: medsignal-ai/backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medsignal-ai/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: medsignal-ai/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
